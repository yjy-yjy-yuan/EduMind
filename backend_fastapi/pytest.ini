[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    smoke: 冒烟测试 - 快速验证基本功能
    unit: 单元测试 - 测试独立模块
    api: API 测试 - 测试 HTTP 接口
    integration: 集成测试 - 测试组件交互
    slow: 慢速测试 - 需要较长时间

filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
