version: '3.8'

services:
  # 后端API服务
  backend:
    build: ./backend
    restart: always
    ports:
      - "5001:5001"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/subtitles:/app/subtitles
      - ./backend/previews:/app/previews
      - ./backend/temp:/app/temp
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=production
      - FLASK_CONFIG=production
      - DATABASE_URL=mysql+pymysql://ai_edvision:${MYSQL_PASSWORD}@db/ai_edvision
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - ai_edvision_network

  # Celery Worker服务
  celery_worker:
    build: ./backend
    restart: always
    command: celery -A celery_app.celery worker --loglevel=info
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/subtitles:/app/subtitles
      - ./backend/previews:/app/previews
      - ./backend/temp:/app/temp
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=production
      - FLASK_CONFIG=production
      - DATABASE_URL=mysql+pymysql://ai_edvision:${MYSQL_PASSWORD}@db/ai_edvision
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - backend
      - redis
    networks:
      - ai_edvision_network

  # MySQL数据库
  db:
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_DATABASE=ai_edvision
      - MYSQL_USER=ai_edvision
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - ai_edvision_network

  # Redis服务（用于Celery）
  redis:
    image: redis:7.0
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai_edvision_network

  # Nginx反向代理
  nginx:
    image: nginx:1.25
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - ai_edvision_network

networks:
  ai_edvision_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
