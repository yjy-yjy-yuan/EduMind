name: Backend CI

on:
  pull_request:
    paths:
      - ".github/workflows/backend-ci.yml"
      - "backend_fastapi/**"
      - "pyproject.toml"
      - "pytest.ini"
  workflow_dispatch:

jobs:
  ruff-and-pytest:
    name: Ruff + Pytest
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            backend_fastapi/requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<81" wheel ruff
          pip install --no-build-isolation openai-whisper==20240930
          pip install -r backend_fastapi/requirements.txt

      - name: Ruff check
        run: ruff check backend_fastapi/tests

      - name: Run pytest
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///./ci-test.db
          WHISPER_PRELOAD_ON_STARTUP: "false"
        run: |
          cd backend_fastapi
          pytest tests/smoke