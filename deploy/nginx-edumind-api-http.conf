# ============================================================
# EduMind Nginx 反向代理配置 — HTTP 过渡版（80 端口）
# 用途：域名刚指向 ECS IP、尚未申请 HTTPS 证书时使用
#
# 部署方式（推荐，兼容所有 Linux 发行版）：
#   sudo cp deploy/nginx-edumind-api-http.conf /etc/nginx/conf.d/edumind-api-http.conf
#   sudo sed -i 's/YOUR_DOMAIN_HERE/你的真实域名/g' /etc/nginx/conf.d/edumind-api-http.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# 旧版 sites-available/sites-enabled 方式同样可用，
# 但 /etc/nginx/conf.d/*.conf 更稳定（无需处理 default 站点冲突）。
# ============================================================

server {
    listen 80;
    server_name YOUR_DOMAIN_HERE;       # ← 替换为你的真实域名，如 api.example.com

    # --- 请求日志 ---
    access_log /var/log/nginx/edumind_api_access.log;
    error_log  /var/log/nginx/edumind_api_error.log warn;

    # --- API 代理（主路由） ---
    location / {
        proxy_pass         http://127.0.0.1:2004;
        proxy_http_version  1.1;

        # 保留原始请求头（关键：Nginx 在反向代理时必须显式转发）
        proxy_set_header   Host                 $host;
        proxy_set_header   X-Real-IP            $remote_addr;
        proxy_set_header   X-Forwarded-For       $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto    $scheme;
        proxy_set_header   X-Forwarded-Host     $host;
        proxy_set_header   X-Forwarded-Port     $server_port;

        # 代理超时（视频上传需要较长超时）
        proxy_connect_timeout  60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
        proxy_buffering       off;

        # 文件上传大小限制（与后端 app/core/config.py 中 MAX_FILE_SIZE 对应）
        client_max_body_size   5G;
    }

    # --- WebSocket / 长连接（用于流式响应） ---
    location /ws/ {
        proxy_pass         http://127.0.0.1:2004/ws/;
        proxy_http_version  1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # --- Let's Encrypt 证书申请路径（certbot HTTP-01 挑战，勿删除）---
    location /.well-known/acme-challenge/ {
        root /var/www/edumind/certbot;
        try_files $uri =404;
    }
}
