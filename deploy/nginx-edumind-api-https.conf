# ============================================================
# EduMind Nginx 反向代理配置 — HTTPS 正式版（443 端口）
# 用途：certbot 申请证书成功后使用此配置
#
# 部署方式（推荐）：
#   sudo cp deploy/nginx-edumind-api-https.conf /etc/nginx/conf.d/edumind-api-https.conf
#   sudo sed -i 's/YOUR_DOMAIN_HERE/你的真实域名/g' /etc/nginx/conf.d/edumind-api-https.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# 证书申请（certbot --nginx 模式，无需 --webroot）：
#   sudo certbot --nginx -d YOUR_DOMAIN_HERE \
#     --redirect --hsts --staple-ocsp \
#     --agree-tos -m YOUR_EMAIL@example.com --non-interactive
#
# certbot 会自动修改本文件中的 ssl_certificate 等路径，
# 写入 /etc/letsencrypt/options-ssl-nginx.conf 和 ssl-dhparams.pem。
# 手动续期测试: sudo certbot renew --dry-run
# ============================================================

server {
    listen 80;
    server_name YOUR_DOMAIN_HERE;       # ← 替换为你的真实域名
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN_HERE;       # ← 替换为你的真实域名

    # --- SSL 证书（certbot 自动写入，不要手动修改 certbot 标记之间的内容）---
    # >>> certbot 写入区开始 <<<
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN_HERE/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_HERE/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
    # <<< certbot 写入区结束 <<<

    # --- 安全响应头（certbot 可能部分覆盖，可手动补全）---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # --- 请求日志 ---
    access_log /var/log/nginx/edumind_api_access.log;
    error_log  /var/log/nginx/edumind_api_error.log warn;

    # --- API 代理 ---
    location / {
        proxy_pass         http://127.0.0.1:2004;
        proxy_http_version  1.1;

        proxy_set_header   Host                 $host;
        proxy_set_header   X-Real-IP            $remote_addr;
        proxy_set_header   X-Forwarded-For       $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto    $scheme;
        proxy_set_header   X-Forwarded-Host     $host;
        proxy_set_header   X-Forwarded-Port     $server_port;

        proxy_connect_timeout  60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
        proxy_buffering       off;
        client_max_body_size  5G;
    }

    # --- WebSocket ---
    location /ws/ {
        proxy_pass         http://127.0.0.1:2004/ws/;
        proxy_http_version  1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # --- Let's Encrypt 证书续期（certbot HTTP-01 挑战）---
    location /.well-known/acme-challenge/ {
        root /var/www/edumind/certbot;
        try_files $uri =404;
    }

    # --- 证书续期健康检查（供 certbot 验证服务可用性）---
    location /health {
        proxy_pass         http://127.0.0.1:2004/health;
        proxy_http_version  1.1;
        proxy_set_header   Host $host;
        access_log off;
    }
}
