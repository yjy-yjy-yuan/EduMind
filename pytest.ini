[pytest]
# 测试目录
testpaths = tests

# Python 文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出配置
addopts = -v --tb=short

# 标记定义
markers =
    smoke: 冒烟测试 - 快速验证基本功能
    unit: 单元测试 - 测试单个组件
    api: API测试 - 测试HTTP接口
    integration: 集成测试 - 测试组件交互
    slow: 慢速测试 - 需要较长时间运行

# 忽略警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
