minimum_pre_commit_version: "3.6.0"
default_stages: [pre-commit]
exclude: |
  (?x)^(
    \.git/|
    \.venv/|
    \.xcode-derived/|
    backend_fastapi/uploads/|
    ios-app/EduMindIOS/EduMindIOS/WebAssets/|
    mobile-frontend/dist/|
    mobile-frontend/node_modules/
  )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-ast
        files: ^(backend_fastapi/.*\.py|download_whisper\.py|scripts/.*\.py)$
      - id: check-byte-order-marker
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: trailing-whitespace
      - id: check-added-large-files
        args: [--maxkb=2048]
      - id: check-shebang-scripts-are-executable
      - id: check-executables-have-shebangs

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        files: ^(backend_fastapi/.*\.py|download_whisper\.py|scripts/.*\.py)$
        args: [--config=pyproject.toml]

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        files: ^(backend_fastapi/.*\.py|download_whisper\.py|scripts/.*\.py)$
        args: [--settings-path=pyproject.toml]

  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        files: ^(backend_fastapi/.*\.py|download_whisper\.py|scripts/.*\.py)$

  - repo: local
    hooks:
      - id: bash-syntax-check
        name: bash syntax check
        entry: bash -n
        language: system
        types: [shell]

      - id: frontend-debug-statement-guard
        name: frontend debug statement guard
        entry: python3 scripts/hooks/check_debug_statements.py
        language: system
        files: ^mobile-frontend/src/.*\.(js|vue)$

      - id: conventional-commit-message
        name: conventional commit message
        entry: python3 scripts/hooks/commit_msg_check.py
        language: system
        pass_filenames: true
        always_run: true
        stages: [commit-msg]

      - id: pre-push-quality-gate
        name: pre-push quality gate
        entry: bash scripts/hooks/pre_push.sh
        language: system
        pass_filenames: false
        always_run: true
        require_serial: true
        stages: [pre-push]
